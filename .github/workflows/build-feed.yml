name: Generar feed.xml del podcast

on:
  push:
    branches: [main]
    paths:
      - "episodes/**"
      - "scripts/generate_feed.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install mutagen

      - name: Generar feed.xml
        run: python scripts/generate_feed.py

      - name: Subir feed.xml si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git diff --staged --quiet || git commit -m "Actualizar feed.xml automáticamente"
          git push
